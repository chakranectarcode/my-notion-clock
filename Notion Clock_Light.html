<!-- Chakra Nectar — The Sanctum Instrument — Celestial Clock (Light Theme) — v2 -->
<div class="cn-clock-card">
  <svg class="cn-clock-svg" viewBox="0 0 440 440" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="goldMetal" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"  stop-color="#4a3410"/>
        <stop offset="15%" stop-color="#7a541e"/>
        <stop offset="35%" stop-color="#b8863a"/>
        <stop offset="50%" stop-color="#f2dca0"/>
        <stop offset="58%" stop-color="#fdf3d0"/>
        <stop offset="66%" stop-color="#cfa050"/>
        <stop offset="85%" stop-color="#7a541e"/>
        <stop offset="100%" stop-color="#4a3410"/>
      </linearGradient>

      <linearGradient id="goldMetalDim" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"  stop-color="#5c4018" stop-opacity="0.9"/>
        <stop offset="45%" stop-color="#c9a465" stop-opacity="0.9"/>
        <stop offset="55%" stop-color="#e9d29c" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#5c4018" stop-opacity="0.9"/>
      </linearGradient>

      <radialGradient id="goldMetalRadial" cx="35%" cy="30%" r="75%">
        <stop offset="0%"  stop-color="#fdf3d0"/>
        <stop offset="30%" stop-color="#f0cf85"/>
        <stop offset="60%" stop-color="#b8863a"/>
        <stop offset="100%" stop-color="#4a3410"/>
      </radialGradient>

      <filter id="ringShadow" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#4a3410" flood-opacity="0.38"/>
      </filter>
      <filter id="innerRingShadow" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#4a3410" flood-opacity="0.22"/>
      </filter>
      <filter id="handShadow" x="-80%" y="-80%" width="260%" height="260%">
        <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#4a3410" flood-opacity="0.35"/>
      </filter>
      <filter id="hubShadow" x="-100%" y="-100%" width="300%" height="300%">
        <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#4a3410" flood-opacity="0.45"/>
      </filter>
      <filter id="softGlow" x="-150%" y="-150%" width="400%" height="400%">
        <feGaussianBlur stdDeviation="6"/>
      </filter>
    </defs>

    <!-- Inner tilted armillary ring -->
    <ellipse cx="220" cy="220" rx="113" ry="83"
      transform="rotate(-13 220 220)"
      fill="none" stroke="url(#goldMetalDim)" stroke-width="3.5"
      filter="url(#innerRingShadow)"/>

    <!-- Outer ring -->
    <circle cx="220" cy="220" r="150" fill="none"
      stroke="url(#goldMetal)" stroke-width="9"
      filter="url(#ringShadow)"/>

    <!-- Right-side minimalist ticks (1,2,3,4,5 o'clock) -->
    <g stroke="url(#goldMetal)" stroke-width="3" stroke-linecap="round">
      <line x1="220" y1="70" x2="220" y2="79" transform="rotate(30 220 220)"/>
      <line x1="220" y1="70" x2="220" y2="79" transform="rotate(60 220 220)"/>
      <line x1="220" y1="70" x2="220" y2="79" transform="rotate(90 220 220)"/>
      <line x1="220" y1="70" x2="220" y2="79" transform="rotate(120 220 220)"/>
      <line x1="220" y1="70" x2="220" y2="79" transform="rotate(150 220 220)"/>
    </g>

    <!-- Chakra rivets: 6:00 Root ascending to 12:00 Crown -->
    <g filter="url(#hubShadow)">
      <circle cx="220" cy="370" r="7.5" fill="url(#goldMetalRadial)"/>
      <circle cx="145" cy="349.9" r="7.5" fill="url(#goldMetalRadial)"/>
      <circle cx="90.1" cy="295" r="7.5" fill="url(#goldMetalRadial)"/>
      <circle cx="70" cy="220" r="7.5" fill="url(#goldMetalRadial)"/>
      <circle cx="90.1" cy="145" r="7.5" fill="url(#goldMetalRadial)"/>
      <circle cx="145" cy="90.1" r="7.5" fill="url(#goldMetalRadial)"/>
      <circle cx="220" cy="70" r="8" fill="url(#goldMetalRadial)"/>
    </g>

    <!-- Roman numerals -->
    <g class="cn-numerals">
      <text x="220" y="42">XII</text>
      <text x="309" y="65.9">I</text>
      <text x="374.1" y="131">II</text>
      <text x="398" y="220">III</text>
      <text x="374.1" y="309">IV</text>
      <text x="309" y="374.1">V</text>
      <text x="220" y="398">VI</text>
      <text x="131" y="374.1">VII</text>
      <text x="65.9" y="309">VIII</text>
      <text x="42" y="220">IX</text>
      <text x="65.9" y="131">X</text>
      <text x="131" y="65.9">XI</text>
    </g>

    <!-- Hands -->
    <g id="hourHand" filter="url(#handShadow)">
      <polygon points="220,150 223,208 222.5,232 220,236 217.5,232 217,208" fill="url(#goldMetal)"/>
    </g>
    <g id="minuteHand" filter="url(#handShadow)">
      <polygon points="220,108 222,208 221.5,232 220,237 218.5,232 218,208" fill="url(#goldMetal)"/>
    </g>
    <g id="secondHand" filter="url(#handShadow)">
      <line x1="220" y1="85" x2="220" y2="220" stroke="url(#goldMetal)" stroke-width="1.6" stroke-linecap="round"/>
      <circle cx="220" cy="238" r="4.5" fill="url(#goldMetalRadial)"/>
    </g>

    <!-- Center hub -->
    <circle id="hubGlow" cx="220" cy="220" r="20" fill="#f2dca0" opacity="0.35" filter="url(#softGlow)"/>
    <circle cx="220" cy="220" r="15" fill="url(#goldMetalRadial)" filter="url(#hubShadow)"/>
    <circle cx="220" cy="220" r="15" fill="none" stroke="#4a3410" stroke-width="0.75" opacity="0.5"/>
  </svg>
</div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap');

  .cn-clock-card {
    width: 380px;
    max-width: 92vw;
    margin: 0 auto;
    padding: 36px;
    box-sizing: border-box;
    border-radius: 28px;
    background: radial-gradient(circle at 50% 42%, #f6efdf 0%, #f0e8d8 45%, #d4c49a 100%);
    box-shadow:
      inset 0 0 60px rgba(74,52,16,0.10),
      0 18px 40px rgba(74,52,16,0.16),
      0 4px 10px rgba(74,52,16,0.10);
    border: 1px solid rgba(154,110,40,0.25);
  }
  .cn-clock-svg {
    display: block;
    width: 100%;
    height: auto;
  }
  .cn-numerals text {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
    fill: #6b4a1a;
    text-anchor: middle;
    dominant-baseline: middle;
  }
  #hubGlow {
    transform-box: fill-box;
    transform-origin: center;
    animation: cnHubPulse 4s ease-in-out infinite;
  }
  @keyframes cnHubPulse {
    0%, 100% { transform: scale(1);    opacity: 0.30; }
    50%      { transform: scale(1.35); opacity: 0.55; }
  }
</style>

<script>
  (function () {
    const hourHand = document.getElementById('hourHand');
    const minuteHand = document.getElementById('minuteHand');
    const secondHand = document.getElementById('secondHand');

    function updateClock() {
      const now = new Date();
      const s = now.getSeconds() + now.getMilliseconds() / 1000;
      const m = now.getMinutes() + s / 60;
      const h = (now.getHours() % 12) + m / 60;

      const secDeg = (s / 60) * 360;
      const minDeg = (m / 60) * 360;
      const hourDeg = (h / 12) * 360;

      hourHand.setAttribute('transform', `rotate(${hourDeg} 220 220)`);
      minuteHand.setAttribute('transform', `rotate(${minDeg} 220 220)`);
      secondHand.setAttribute('transform', `rotate(${secDeg} 220 220)`);

      requestAnimationFrame(updateClock);
    }
    updateClock();
  })();
</script>
