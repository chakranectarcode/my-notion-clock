<!-- Chakra Nectar — The Sanctum Instrument — Celestial Clock (Light Theme) — v5 -->
<div class="cn-clock-card">
  <svg class="cn-clock-svg" viewBox="0 0 705 705" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="goldMetal" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"  stop-color="#4a3410"/>
        <stop offset="15%" stop-color="#7a541e"/>
        <stop offset="35%" stop-color="#b8863a"/>
        <stop offset="50%" stop-color="#f2dca0"/>
        <stop offset="58%" stop-color="#fdf3d0"/>
        <stop offset="66%" stop-color="#cfa050"/>
        <stop offset="85%" stop-color="#7a541e"/>
        <stop offset="100%" stop-color="#4a3410"/>
      </linearGradient>

      <linearGradient id="goldMetalDim" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"  stop-color="#5c4018" stop-opacity="0.9"/>
        <stop offset="45%" stop-color="#c9a465" stop-opacity="0.9"/>
        <stop offset="55%" stop-color="#e9d29c" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#5c4018" stop-opacity="0.9"/>
      </linearGradient>

      <!-- Iridescent blue/purple/green gradient for the crescent-moon second hand -->
      <linearGradient id="iridescent" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%"  stop-color="#2e8b7a"/>
        <stop offset="20%" stop-color="#4fd8c4"/>
        <stop offset="38%" stop-color="#eaf6ff"/>
        <stop offset="55%" stop-color="#8a7fe0"/>
        <stop offset="75%" stop-color="#b06be0"/>
        <stop offset="90%" stop-color="#4fd8c4"/>
        <stop offset="100%" stop-color="#2e8b7a"/>
      </linearGradient>

      <radialGradient id="goldMetalRadial" cx="35%" cy="30%" r="75%">
        <stop offset="0%"  stop-color="#fdf3d0"/>
        <stop offset="30%" stop-color="#f0cf85"/>
        <stop offset="60%" stop-color="#b8863a"/>
        <stop offset="100%" stop-color="#4a3410"/>
      </radialGradient>

      <filter id="ringShadow" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#4a3410" flood-opacity="0.38"/>
      </filter>
      <filter id="innerRingShadow" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#4a3410" flood-opacity="0.22"/>
      </filter>
      <filter id="handShadow" x="-80%" y="-80%" width="260%" height="260%">
        <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#4a3410" flood-opacity="0.35"/>
      </filter>
      <filter id="hubShadow" x="-100%" y="-100%" width="300%" height="300%">
        <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#4a3410" flood-opacity="0.45"/>
      </filter>
      <filter id="softGlow" x="-150%" y="-150%" width="400%" height="400%">
        <feGaussianBlur stdDeviation="6"/>
      </filter>
    </defs>

    <!-- Everything below is authored at 1x in a 235,235-centered space, then scaled 1.5x as a block -->
    <g transform="scale(1.5)">

      <!-- ===== ROTATING WHEELS (armillary motion) — numerals/nodules/hands are NOT inside these groups ===== -->
      <g class="cn-wheelOuter">
        <circle cx="235" cy="235" r="165" fill="none" stroke="url(#goldMetal)" stroke-width="11" filter="url(#ringShadow)"/>
      </g>

      <g class="cn-wheelInner">
        <ellipse cx="235" cy="235" rx="124" ry="91" transform="rotate(-13 235 235)"
          fill="none" stroke="url(#goldMetalDim)" stroke-width="3.8" filter="url(#innerRingShadow)"/>
      </g>

      <!-- ===== FIXED FRAME: nodules at all 12 hours ===== -->
      <g filter="url(#hubShadow)">
        <circle class="cn-node" cx="235"   cy="400"   r="8.3" fill="url(#goldMetalRadial)" style="animation-duration:6.8s; animation-delay:0s;"/>
        <circle class="cn-node" cx="152.5" cy="377.9" r="8.3" fill="url(#goldMetalRadial)" style="animation-duration:7.4s; animation-delay:0.6s;"/>
        <circle class="cn-node" cx="92.1"  cy="317.5" r="8.3" fill="url(#goldMetalRadial)" style="animation-duration:6.2s; animation-delay:1.2s;"/>
        <circle class="cn-node" cx="70"    cy="235"   r="8.3" fill="url(#goldMetalRadial)" style="animation-duration:7.9s; animation-delay:1.8s;"/>
        <circle class="cn-node" cx="92.1"  cy="152.5" r="8.3" fill="url(#goldMetalRadial)" style="animation-duration:7.1s; animation-delay:2.4s;"/>
        <circle class="cn-node" cx="152.5" cy="92.1"  r="8.3" fill="url(#goldMetalRadial)" style="animation-duration:6.5s; animation-delay:3.0s;"/>
        <circle class="cn-node" cx="235"   cy="70"    r="9"   fill="url(#goldMetalRadial)" style="animation-duration:8.2s; animation-delay:3.6s;"/>
        <circle class="cn-node" cx="317.5" cy="92.1"  r="8.3" fill="url(#goldMetalRadial)" style="animation-duration:7.6s; animation-delay:0.3s;"/>
        <circle class="cn-node" cx="377.9" cy="152.5" r="8.3" fill="url(#goldMetalRadial)" style="animation-duration:6.9s; animation-delay:0.9s;"/>
        <circle class="cn-node" cx="400"   cy="235"   r="8.3" fill="url(#goldMetalRadial)" style="animation-duration:7.3s; animation-delay:1.5s;"/>
        <circle class="cn-node" cx="377.9" cy="317.5" r="8.3" fill="url(#goldMetalRadial)" style="animation-duration:6.6s; animation-delay:2.1s;"/>
        <circle class="cn-node" cx="317.5" cy="377.9" r="8.3" fill="url(#goldMetalRadial)" style="animation-duration:7.8s; animation-delay:2.7s;"/>
      </g>

      <!-- ===== FIXED FRAME: numerals ===== -->
      <g class="cn-numerals">
        <text x="235"   y="35">12</text>
        <text x="335"   y="61.8">1</text>
        <text x="408.2" y="135">2</text>
        <text x="435"   y="235">3</text>
        <text x="408.2" y="335">4</text>
        <text x="335"   y="408.2">5</text>
        <text x="235"   y="435">6</text>
        <text x="135"   y="408.2">7</text>
        <text x="61.8"  y="335">8</text>
        <text x="35"    y="235">9</text>
        <text x="61.8"  y="135">10</text>
        <text x="135"   y="61.8">11</text>
      </g>

      <!-- ===== HANDS — driven only by real time via JS, never touched by the wheel animations ===== -->
      <g id="hourHand" filter="url(#handShadow)">
        <polygon points="235,158 238.3,222 237.75,248 235,252.6 232.25,248 231.7,222" fill="url(#goldMetal)"/>
      </g>
      <g id="minuteHand" filter="url(#handShadow)">
        <polygon points="235,112 237.2,222 236.65,248 235,253.7 233.35,248 232.8,222" fill="url(#goldMetal)"/>
      </g>
      <g id="secondHand" filter="url(#handShadow)">
        <line x1="235" y1="217" x2="235" y2="191" stroke="url(#goldMetal)" stroke-width="2.4" stroke-linecap="round"/>
        <g transform="translate(235,181) rotate(-20)">
          <path d="M0,-10 a10,10 0 1,0 0,20 a6.5,6.5 0 1,1 0,-20 Z" fill="url(#iridescent)"/>
        </g>
      </g>

      <!-- Center hub -->
      <circle id="hubGlow" cx="235" cy="235" r="24" fill="#f2dca0" opacity="0.35" filter="url(#softGlow)"/>
      <circle cx="235" cy="235" r="17" fill="url(#goldMetalRadial)" filter="url(#hubShadow)"/>
      <circle cx="235" cy="235" r="17" fill="none" stroke="#4a3410" stroke-width="0.9" opacity="0.5"/>

    </g>
  </svg>

  <div class="cn-date" id="cnDate">Loading…</div>
</div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap');

  .cn-clock-card {
    width: 840px;
    max-width: 96vw;
    margin: 0 auto;
    padding: 60px 60px 48px;
    box-sizing: border-box;
    border-radius: 40px;
    background: radial-gradient(circle at 50% 42%, #f6efdf 0%, #f0e8d8 45%, #d4c49a 100%);
    box-shadow:
      inset 0 0 80px rgba(74,52,16,0.10),
      0 24px 54px rgba(74,52,16,0.16),
      0 6px 14px rgba(74,52,16,0.10);
    border: 1px solid rgba(154,110,40,0.25);
  }
  .cn-clock-svg {
    display: block;
    width: 100%;
    height: auto;
  }
  .cn-numerals text {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.5px;
    fill: #5c3f14;
    text-anchor: middle;
    dominant-baseline: middle;
  }
  .cn-date {
    margin-top: 28px;
    text-align: center;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #5c3f14;
  }
  #hubGlow {
    transform-box: fill-box;
    transform-origin: center;
    animation: cnHubPulse 4s ease-in-out infinite;
  }
  @keyframes cnHubPulse {
    0%, 100% { transform: scale(1);    opacity: 0.30; }
    50%      { transform: scale(1.35); opacity: 0.55; }
  }

  /* Armillary wheel motion — slow, continuous, independent, contrary directions */
  .cn-wheelOuter {
    transform-box: fill-box;
    transform-origin: center;
    animation: cnSpinCW 220s linear infinite;
  }
  .cn-wheelInner {
    transform-box: fill-box;
    transform-origin: center;
    animation: cnSpinCCW 60s linear infinite;
  }
  @keyframes cnSpinCW  { from { transform: rotate(0deg);   } to { transform: rotate(360deg);  } }
  @keyframes cnSpinCCW { from { transform: rotate(0deg);   } to { transform: rotate(-360deg); } }

  /* Nodule flicker — slow, gentle, asynchronous (speed ~3/10) */
  .cn-node {
    transform-box: fill-box;
    transform-origin: center;
    animation-name: cnNodeFlicker;
    animation-timing-function: ease-in-out;
    animation-iteration-count: infinite;
  }
  @keyframes cnNodeFlicker {
    0%, 100% { filter: brightness(1)    saturate(1);    }
    50%      { filter: brightness(1.45) saturate(1.15); }
  }
</style>

<script>
  (function () {
    const hourHand = document.getElementById('hourHand');
    const minuteHand = document.getElementById('minuteHand');
    const secondHand = document.getElementById('secondHand');
    const dateEl = document.getElementById('cnDate');

    const TZ = 'America/New_York';

    const timeFmt = new Intl.DateTimeFormat('en-US', {
      timeZone: TZ, hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    const dateFmt = new Intl.DateTimeFormat('en-US', {
      timeZone: TZ, weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
    });

    function getEasternHMS(now) {
      const parts = timeFmt.formatToParts(now);
      const map = {};
      parts.forEach(p => { map[p.type] = p.value; });
      let hour = parseInt(map.hour, 10);
      if (hour === 24) hour = 0;
      return {
        hour: hour,
        minute: parseInt(map.minute, 10),
        second: parseInt(map.second, 10)
      };
    }

    let lastDateStr = '';

    function updateClock() {
      const now = new Date();
      const { hour, minute, second } = getEasternHMS(now);

      const s = second + now.getMilliseconds() / 1000;
      const m = minute + s / 60;
      const h = (hour % 12) + m / 60;

      const secDeg = (s / 60) * 360;
      const minDeg = (m / 60) * 360;
      const hourDeg = (h / 12) * 360;

      hourHand.setAttribute('transform', `rotate(${hourDeg} 235 235)`);
      minuteHand.setAttribute('transform', `rotate(${minDeg} 235 235)`);
      secondHand.setAttribute('transform', `rotate(${secDeg} 235 235)`);

      const dateStr = dateFmt.format(now);
      if (dateStr !== lastDateStr) {
        dateEl.textContent = dateStr;
        lastDateStr = dateStr;
      }

      requestAnimationFrame(updateClock);
    }
    updateClock();
  })();
</script>
